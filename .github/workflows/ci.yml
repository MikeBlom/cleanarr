name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite://"
      WORKER_ENABLED: "false"
      PLEX_ADMIN_TOKEN: "test-token"
      PLEX_SERVER_URL: "http://localhost:32400"
      ALLOWED_MEDIA_DIRS: "/mnt/media"
      BASE_URL: "http://localhost:8765"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[test]" "passlib[bcrypt]" "bcrypt<4.1"
      - run: pytest tests/ -v --tb=short

  docker-build:
    # Only build Docker images on pushes to main, not on PRs
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile
            tag: cleanarr:test
          - dockerfile: Dockerfile.cuda
            tag: cleanarr:test-cuda
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f ${{ matrix.dockerfile }} -t ${{ matrix.tag }} .
